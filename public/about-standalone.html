<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>关于良之 | 良之世界</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600&family=Inter:wght@300;400&display=swap" rel="stylesheet">
  <style>
    :root {
      --color-bg: #fcfbf9;
      --color-text: #1a1a1a;
      --color-gold: #b8903c;
      --color-gray: #4b5563;
      --font-sans: 'Inter', sans-serif;
      --font-serif: 'Noto Serif SC', serif;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background-color: var(--color-bg);
      color: var(--color-text);
      font-family: var(--font-sans);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
    }
    .container {
      padding: 2rem;
    }
    h1 { 
      font-family: var(--font-serif); 
      font-size: 3rem; 
      font-weight: 600; 
      letter-spacing: 0.1em;
      margin-bottom: 2rem;
    }
    .divider {
      width: 3rem;
      height: 1px;
      background-color: var(--color-gold);
      margin: 0 auto 2rem auto;
      opacity: 0.5;
    }
    p { 
      font-size: 1.25rem; 
      color: var(--color-gray); 
      font-weight: 300;
      letter-spacing: 0.05em;
    }
    a.back {
      display: inline-block;
      margin-top: 5rem;
      font-size: 0.875rem;
      color: #9ca3af;
      text-decoration: none;
      border-bottom: 1px solid transparent;
      transition: all 0.3s;
    }
    a.back:hover {
      color: var(--color-gold);
      border-bottom-color: var(--color-gold);
    }
  </style>
</head>
<body>
  <div class="container">
    <h1 style="margin-bottom: 0.5rem;">李昂</h1>
    <p style="margin-bottom: 2rem;">广州菲娜睿特人工智能科技有限责任公司创始人 & CEO</p>

    <div class="divider"></div>

    <h2 style="font-family: var(--font-serif); font-size: 2.5rem; font-weight: 600; letter-spacing: 0.1em; margin-bottom: 0.5rem;">
      <a href="https://liang.world/cv" style="color: inherit; text-decoration: none; transition: color 0.3s;" onmouseover="this.style.color='#b8903c'" onmouseout="this.style.color='inherit'">
        良之
      </a>
    </h2>
    <p>广州菲娜睿特人工智能科技有限责任公司联合创始人 & CTO</p>

    <a href="https://liang.world" class="back">返回 良之世界</a>
  </div>
</body>
</html>
