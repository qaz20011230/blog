name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run check

      - name: Lint
        run: npm run lint

      - name: Build (RSS + Sitemap + Stats + Vite)
        run: npm run build

      - name: Verify deterministic artifacts are up to date
        run: |
          # sitemap.xml / en-sitemap.xml / stats.json are deterministic and must
          # match the committed copies. (RSS feeds embed a build timestamp, so
          # they are intentionally excluded from this drift check.)
          if [ -n "$(git status --porcelain public/sitemap.xml public/en-sitemap.xml public/stats.json)" ]; then
            echo "::error::Generated artifacts are out of date. Run 'npm run build' and commit public/sitemap.xml, public/en-sitemap.xml, public/stats.json."
            git --no-pager diff public/sitemap.xml public/en-sitemap.xml public/stats.json
            exit 1
          fi
