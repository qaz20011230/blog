name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run check

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build (RSS + Sitemap + Stats + Vite)
        run: npm run build

      - name: Verify deterministic artifacts are up to date
        run: |
          # sitemap.xml / en-sitemap.xml / stats.json must match committed copies
          # (line-ending differences tolerated via git config)
          git diff --ignore-cr-at-eol -- public/sitemap.xml public/en-sitemap.xml public/stats.json > /tmp/drift.patch
          if [ -s /tmp/drift.patch ]; then
            echo "::error::Generated artifacts are out of date. Run 'npm run build' and commit public/sitemap.xml, public/en-sitemap.xml, public/stats.json."
            cat /tmp/drift.patch
            exit 1
          fi
